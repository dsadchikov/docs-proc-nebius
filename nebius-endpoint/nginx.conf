worker_processes 1;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events { worker_connections 256; }

http {
    access_log /dev/stdout;
    upstream vllm { server 127.0.0.1:8000; }
    upstream fastapi { server 127.0.0.1:8081; }

    server {
        listen 8080;

        location /v1/ {
            proxy_pass http://vllm;
            proxy_set_header Host $host;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        location /recognize {
            proxy_pass http://fastapi;
            proxy_set_header Host $host;
            proxy_read_timeout 60s;
            client_max_body_size 50m;
            error_page 502 503 504 = @fastapi_down;
        }

        location /inbound/presign {
            proxy_pass http://fastapi;
            proxy_set_header Host $host;
            proxy_read_timeout 10s;
            error_page 502 503 504 = @fastapi_down;
        }

        location /blueprints {
            proxy_pass http://fastapi;
            proxy_set_header Host $host;
            proxy_read_timeout 30s;
            client_max_body_size 1m;
            error_page 502 503 504 = @fastapi_down;
        }

        location /health {
            proxy_pass http://fastapi;
            proxy_set_header Host $host;
            error_page 502 503 504 = @vllm_health_fallback;
        }

        location /demo {
            proxy_pass http://fastapi;
            proxy_set_header Host $host;
            error_page 502 503 504 = @fastapi_down;
        }

        location /static {
            proxy_pass http://fastapi;
            proxy_set_header Host $host;
            error_page 502 503 504 = @fastapi_down;
        }

        location @vllm_health_fallback {
            rewrite ^ /health break;
            proxy_pass http://vllm;
        }

        location @fastapi_down {
            default_type application/json;
            return 503 '{"error":"FastAPI unavailable. Use /v1/ for direct model access.","status":"degraded"}';
        }
    }
}
